<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Liberty 25 años</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Inter', sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.text{
font-size:40px;
opacity:0;
animation:fade 3s ease forwards;
}

@keyframes fade{
0%{opacity:0; transform:translateY(20px);}
100%{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="text" id="text"></div>

<script>
const frases = [
"Hace 25 años...",
"No era solo una empresa",
"Era una idea",
"Un propósito",
"Miles de historias comenzaron aquí",
"Crecimos",
"Aprendimos",
"Nos adaptamos",
"La confianza",
"La pasión por viajar",
"Somos Liberty",
"25 años",
"Gracias por ser parte"
];

let i = 0;
const el = document.getElementById("text");

function mostrarTexto(){
el.style.opacity = 0;

setTimeout(()=>{
el.innerText = frases[i];
el.style.opacity = 1;
i++;

if(i < frases.length){
setTimeout(mostrarTexto, 2500);
}
}, 500);
}

mostrarTexto();
</script>

</body>
</html>
