<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberty 25 Años</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#0a0f1c;
color:white;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#0a0f1c,#0f2a5a);
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
opacity:0.7;
margin:20px 0;
}

.btn{
background:#1e90ff;
padding:15px 30px;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* SECCIONES */
.section{
padding:100px 20px;
max-width:1200px;
margin:auto;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* SPEAKERS */
.speakers{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
}

.speaker{
min-width:200px;
background:#111;
border-radius:20px;
overflow:hidden;
}

.speaker img{
width:100%;
height:250px;
object-fit:cover;
}

/* CTA FINAL */
.cta{
text-align:center;
padding:100px 20px;
background:linear-gradient(135deg,#1e90ff,#0047ab);
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>LIBERTY 25 AÑOS</h1>
<p>Una noche que va a marcar historia</p>
<a href="#" class="btn">Registrarse</a>
</section>

<!-- BENEFICIOS -->
<section class="section">
<h2>Una experiencia única</h2>

<div class="cards">
<div class="card">
<h3>Conectá</h3>
<p>Con colegas y partners del sector</p>
</div>

<div class="card">
<h3>Celebrá</h3>
<p>25 años de historia juntos</p>
</div>

<div class="card">
<h3>Viví</h3>
<p>Una noche inolvidable</p>
</div>
</div>
</section>

<!-- SPEAKERS / INVITADOS -->
<section class="section">
<h2>Invitados</h2>

<div class="speakers">
<div class="speaker">
<img src="https://picsum.photos/300/400">
<p>Invitado 1</p>
</div>

<div class="speaker">
<img src="https://picsum.photos/301/400">
<p>Invitado 2</p>
</div>

<div class="speaker">
<img src="https://picsum.photos/302/400">
<p>Invitado 3</p>
</div>
</div>

</section>

<!-- CTA FINAL -->
<section class="cta">
<h2>¿Te lo vas a perder?</h2>
<a href="#" class="btn">Reservar lugar</a>
</section>

</body>
</html>
