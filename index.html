<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liberty 25 Años</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter', sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* HERO SCROLL CONTROL */
.hero{
height:300vh;
position:relative;
}

.sticky{
position:sticky;
top:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* VIDEO */
video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* TEXT */
.title{
font-size:120px;
font-weight:800;
transition:0.2s;
}

.subtitle{
font-size:24px;
margin-top:20px;
opacity:0.8;
transition:0.2s;
}

/* BUTTON */
.btn{
margin-top:40px;
padding:18px 45px;
border-radius:50px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
text-decoration:none;
font-weight:600;
}

/* SCENES */
.scene{
height:150vh;
display:flex;
align-items:center;
justify-content:center;
}

.content{
opacity:0;
transform:translateY(80px);
transition:0.6s;
text-align:center;
}

.content.show{
opacity:1;
transform:translateY(0);
}

.big{
font-size:100px;
font-weight:800;
}

/* SPONSORS */
.carousel{
overflow:hidden;
margin-top:40px;
}

.track{
display:flex;
gap:120px;
animation:scroll 80s linear infinite;
}

.logo{
height:100px;
opacity:0.5;
transition:0.4s;
}

.logo:hover{
opacity:1;
transform:scale(1.3);
}

/* CTA */
.cta{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e40af,#2563eb);
}

/* ANIMACIONES */
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<div class="sticky">

<video id="video" muted playsinline preload="auto">
<source src="https://cdn.coverr.co/videos/coverr-aerial-view-of-a-city-at-night-1572/1080p.mp4">
</video>

<div class="overlay"></div>

<h1 class="title" id="title">LIBERTY 25</h1>
<p class="subtitle" id="subtitle">Esto no es una fiesta. Es historia.</p>

<a href="#" class="btn">Registrarse</a>

</div>
</section>

<!-- SCENES -->
<section class="scene">
<div class="content">
<div class="big">25 años creando conexiones</div>
</div>
</section>

<section class="scene">
<div class="content">
<div class="big">No es un evento</div>
</div>
</section>

<section class="scene">
<div class="content">
<div class="big">Es una experiencia</div>
</div>
</section>

<!-- SPONSORS -->
<section class="scene">
<div class="content">

<h2 style="font-size:50px;">Nos acompañan</h2>

<div class="carousel">
<div class="track">

<img class="logo" src="https://via.placeholder.com/200x80?text=Marca1">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca2">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca3">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca4">

<img class="logo" src="https://via.placeholder.com/200x80?text=Marca1">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca2">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca3">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca4">

</div>
</div>

</div>
</section>

<!-- CTA -->
<section class="cta">
<h2 style="font-size:60px;">¿Te lo vas a perder?</h2>
<a href="#" class="btn">Reservar lugar</a>
</section>

<script>

/* SCROLL CONTROL VIDEO */
const video = document.getElementById('video');

window.addEventListener('scroll', () => {

let scrollTop = window.scrollY;
let maxScroll = document.querySelector('.hero').offsetHeight - window.innerHeight;
let scrollFraction = scrollTop / maxScroll;

if(video.duration){
video.currentTime = video.duration * scrollFraction;
}

/* TEXT EFFECT */
let title = document.getElementById('title');
let subtitle = document.getElementById('subtitle');

title.style.transform = `scale(${1 - scrollFraction * 0.5})`;
subtitle.style.opacity = 1 - scrollFraction * 1.5;

});

/* CONTENT APPEAR */
const contents = document.querySelectorAll('.content');

window.addEventListener('scroll', () => {
contents.forEach(el=>{
let rect = el.getBoundingClientRect();
if(rect.top < window.innerHeight * 0.7){
el.classList.add('show');
}
});
});

</script>

</body>
</html>
