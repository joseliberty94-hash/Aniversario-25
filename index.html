<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liberty 25 Años</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter', sans-serif;
background:#05070d;
color:white;
overflow-x:hidden;
}

/* SCROLL SUAVE */
html{
scroll-behavior:smooth;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle at 50% 50%, #0d1b3d, #05070d);
}

.hero h1{
font-size:80px;
font-weight:800;
line-height:1;
}

.hero p{
margin-top:20px;
opacity:0.6;
font-size:18px;
}

.btn{
margin-top:30px;
background:#1e90ff;
padding:15px 35px;
border-radius:50px;
text-decoration:none;
color:white;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* SECCIONES STORY */
.section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
}

.section h2{
font-size:70px;
max-width:900px;
line-height:1.1;
opacity:0;
transform:translateY(50px);
transition:1s;
}

/* ANIMACION SCROLL */
.section.active h2{
opacity:1;
transform:translateY(0);
}

/* DIFERENTES FONDOS */
.s1{ background:#05070d;}
.s2{ background:#08122a;}
.s3{ background:#0d1b3d;}
.s4{ background:#111c3f;}

/* CTA FINAL */
.cta{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#1e90ff,#002f6c);
}

.cta h2{
font-size:60px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>LIBERTY 25</h1>
<p>No es una fiesta. Es historia.</p>
<a href="#" class="btn">Registrarse</a>
</section>

<!-- STORYTELLING -->
<section class="section s1">
<h2>25 años creando experiencias</h2>
</section>

<section class="section s2">
<h2>Conectando personas</h2>
</section>

<section class="section s3">
<h2>Construyendo el futuro del turismo</h2>
</section>

<section class="section s4">
<h2>Y esto recién empieza</h2>
</section>

<!-- CTA -->
<section class="cta">
<h2>¿Vas a ser parte?</h2>
<a href="#" class="btn">Reservar lugar</a>
</section>

<script>

// animacion al hacer scroll
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
sections.forEach(sec => {
const top = sec.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
sec.classList.add("active");
}
});
});

</script>

</body>
</html>
