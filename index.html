<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liberty 25 Años</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter', sans-serif;
background:#000;
color:white;
overflow-x:hidden;
cursor:none;
}

/* CURSOR */
.cursor{
width:20px;
height:20px;
border:2px solid #3b82f6;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
transition:0.1s;
z-index:999;
}

.cursor-follower{
width:40px;
height:40px;
background:rgba(59,130,246,0.2);
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
transition:0.2s;
z-index:998;
}

/* VIDEO HERO */
.hero{
position:relative;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.hero h1{
font-size:110px;
font-weight:800;
letter-spacing:-3px;
}

.hero p{
margin-top:20px;
font-size:22px;
opacity:0.8;
}

.btn{
margin-top:40px;
padding:18px 45px;
border-radius:50px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 10px 40px rgba(37,99,235,0.7);
}

/* BLOCKS */
.block{
height:120vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.big{
font-size:100px;
font-weight:800;
}

/* PARALLAX */
.parallax{
transform:translateY(0);
transition:transform 0.2s linear;
}

/* SPONSORS */
.carousel{
overflow:hidden;
}

.track{
display:flex;
gap:100px;
animation:scroll 50s linear infinite;
}

.logo{
height:100px;
opacity:0.5;
transition:0.4s;
}

.logo:hover{
opacity:1;
transform:scale(1.3);
}

/* CTA */
.cta{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e40af,#2563eb);
}

/* ANIMACIONES */
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

</style>
</head>

<body>

<!-- CURSOR -->
<div class="cursor"></div>
<div class="cursor-follower"></div>

<!-- HERO -->
<section class="hero">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-aerial-view-of-a-city-at-night-1572/1080p.mp4" type="video/mp4">
</video>

<h1 class="parallax">LIBERTY 25</h1>
<p class="parallax">Esto no es una fiesta. Es historia.</p>

<a href="#" class="btn">Registrarse</a>
</section>

<!-- BLOQUES -->
<section class="block">
<div class="big parallax">25 años conectando</div>
</section>

<section class="block">
<div class="big parallax">No es un evento</div>
</section>

<section class="block">
<div class="big parallax">Es una experiencia</div>
</section>

<!-- SPONSORS -->
<section class="block">
<div>

<h2 style="font-size:50px;margin-bottom:40px;">Nos acompañan</h2>

<div class="carousel">
<div class="track">

<img class="logo" src="https://via.placeholder.com/200x80?text=Marca1">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca2">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca3">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca4">

<img class="logo" src="https://via.placeholder.com/200x80?text=Marca1">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca2">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca3">
<img class="logo" src="https://via.placeholder.com/200x80?text=Marca4">

</div>
</div>

</div>
</section>

<!-- CTA -->
<section class="cta">
<h2 style="font-size:60px;">¿Te lo vas a perder?</h2>
<a href="#" class="btn">Reservar lugar</a>
</section>

<script>

/* CURSOR */
const cursor = document.querySelector('.cursor');
const follower = document.querySelector('.cursor-follower');

document.addEventListener('mousemove', e => {
cursor.style.top = e.clientY + 'px';
cursor.style.left = e.clientX + 'px';

follower.style.top = e.clientY + 'px';
follower.style.left = e.clientX + 'px';
});

/* PARALLAX */
window.addEventListener('scroll', () => {
document.querySelectorAll('.parallax').forEach(el=>{
let speed = 0.3;
el.style.transform = `translateY(${window.scrollY * speed}px)`;
});
});

</script>

</body>
</html>
